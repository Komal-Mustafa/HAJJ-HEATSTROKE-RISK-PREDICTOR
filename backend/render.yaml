services:
  - type: web
    name: hajj-heatstroke-api
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt && python train_model.py
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
